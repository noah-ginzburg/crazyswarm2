# Definition of the various robot types

robot_types:
  cf21:
    motion_capture:
      # tracking: "vendor" # one of "vendor", "librigidbodytracker"
      tracking: "librigidbodytracker" # one of "vendor", "librigidbodytracker"
      # only if enabled; see motion_capture.yaml
      # marker: default_single_marker
      marker: arrangement_v3
      dynamics: default
    big_quad: false
    battery:
      voltage_warning: 3.8  # V
      voltage_critical: 3.7 # V
    # firmware_params:
    #   kalman:
    #     pNAcc_xy: 1.0 # default 0.5
    # firmware_logging: DISABLED -- every log topic here is extra radio traffic
    # competing with the extpos/extpose position corrections sent to the drone;
    # this custom logging was fighting the Vicon corrections for radio time and
    # causing the estimator to stall/drift. Re-enable only for debugging, not
    # during normal flight.
    # firmware_logging:
    #   enabled: true
    #   custom_topics:
    #     low_level_control:
    #       frequency: 50
    #       vars: ["ctrlMel.cmd_thrust", "ctrlMel.cmd_roll", "ctrlMel.cmd_pitch", "ctrlMel.cmd_yaw"]
    #     # Per-motor PWM (0..65535). A weak motor shows consistently HIGHER pwm than
