    # enabled: true
    uri: radio://0/100/2M/E7E7E7E703
    # icosphere node 35: (-0.809017, -0.500000, -0.309017)
    initial_position: [-0.809017, -0.500000, 0.0]
    delta_z: -0.309017
    type: cf21

