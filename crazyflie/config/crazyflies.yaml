  # cf01/cf02/cf03 form an exact equilateral target triangle on the unit
  # icosphere (pv.Icosphere(radius=1.0, nsub=3), same as spherical_ran).
  # Nodes 12/21/35: every pair is 120 deg of arc apart, centroid at the
  # sphere center. initial_position is the FLOOR placement (x, y of the
  # node, z=0) -- x,y match the node exactly, but z can't be recovered from
  # them (sqrt(1 - x^2 - y^2) only gives the magnitude, and the triangle only
  # stays equilateral with the correct sign per node -- flattening all three
  # to the same hemisphere collapses it). So each node's z ships here as
  # delta_z, read by crazyswarm_bringup/launch/*.launch.py and added on top
  # of controller_server's launch_height parameter at takeoff (the drone's
  # own initial_position.z stays 0 -- it still starts flat on the floor).

  cf03:
