# Definition of the various robot types

robot_types:
  cf21:
    motion_capture:
      # tracking: "vendor" # one of "vendor", "librigidbodytracker"
      tracking: "librigidbodytracker" # one of "vendor", "librigidbodytracker"
      # only if enabled; see motion_capture.yaml
      # marker: default_single_marker
      marker: arrangement_v3
      dynamics: default
    big_quad: false
    battery:
      voltage_warning: 3.8  # V
      voltage_critical: 3.7 # V
    # firmware_params:
    #   kalman:
    #     pNAcc_xy: 1.0 # default 0.5
    firmware_logging:
      enabled: true
      # default_topics:
      #   pose:
      #     frequency: 1 # Hz
      custom_topics:
        low_level_control: 
          frequency: 50
          vars: ["ctrlMel.cmd_thrust", "ctrlMel.cmd_roll", "ctrlMel.cmd_pitch", "ctrlMel.cmd_yaw"]
        # your_topic_name:
          # frequency: 10
          # vars: ["stateEstimateZ.x", "stateEstimateZ.y", "stateEstimateZ.z", "acc.x", "acc.y", "acc.z"]
          ## vars: ["acc.x", "acc.y", "acc.z"]

    # reference_frame: "odom" 

  cf21_mocap_deck:
    motion_capture:
      tracking: "librigidbodytracker" # one of "vendor", "librigidbodytracker"
      # only if enabled; see motion_capture.yaml
      marker: mocap_deck
      dynamics: default
    big_quad: false
    battery:
      voltage_warning: 3.8  # V
      voltage_critical: 3.7 # V
    # firmware_params:
    #   kalman:
    #     pNAcc_xy: 1.0 # default 0.5
    #firmware_logging:
    #   enabled: true
    #   default_topics:
    #   pose:
    #     frequency: 1 # Hz
    #   custom_topics:
    #    topic_name3: 
    #      frequency: 1
    #      vars: ["acc.x", "acc.y", "acc.z"]
    # reference_frame: "mocap" 

# global settings for all robots
all:
  # firmware logging for all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  firmware_logging:
    enabled: true
    default_topics:
     # remove to disable default topic
      pose:
        frequency: 100 # Hz
      status:
        frequency: 1 # Hz
    # --- tuning diagnostics (uncomment to re-enable; adds radio load) ---
    # custom_topics:
    #   ctrl:
    #     frequency: 50 # Hz
    #     # What the position/velocity controller is COMMANDING the attitude loop to do.
    #     # On a pure vertical (z) command these should stay near 0; if roll/pitch
    #     # targets swing, the position controller is over-reacting -> wobble/flip.
    #     vars: ["ctrltarget.roll", "ctrltarget.pitch", "stabilizer.thrust"]
    #   est:
    #     frequency: 50 # Hz
    #     # Kalman position variance = estimate health. If these are large or growing,
    #     # the estimate is bad -> fix Vicon/extpos before touching any gain.
    #     vars: ["kalman.varPX", "kalman.varPY", "kalman.varPZ"]
  # firmware parameters for all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      # estimator: 1 # 1: complementary, 2: kalman
      estimator: 2 # 1: complementary, 2: kalman
      controller: 1 # 1: PID, 2: mellinger  (PID for bring-up; mellinger flips on imperfect estimate)
      # controller: 2 # 1: PID, 2: mellinger
    # ring:
    #   effect: 16 # 6: double spinner, 7: solid color, 16: packetRate
    #   solidBlue: 255 # if set to solid color
    #   solidGreen: 0 # if set to solid color
    #   solidRed: 0 # if set to solid color
    #   headlightEnable: 0
    locSrv:
      extPosStdDev: 1e-2   # 1cm; 1e-3 (1mm) over-trusts mocap and diverges the Kalman filter
      extQuatStdDev: 0.5e-1
    kalman:
      resetEstimation: 1   # clear NaN/stale estimator state on connect (NaN never self-heals)
  # reference frame for on-board state-estimate of all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  # reference_frame: "world"
  reference_frame: "mocap"
  broadcasts:
    num_repeats: 15 # number of times broadcast commands are repeated
    delay_between_repeats_ms: 1 # delay in milliseconds between individual repeats
